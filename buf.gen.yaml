version: v2
clean: true
# Generates the Connect-ES (protobuf-es v2) clients + connect-query hooks for the
# codefly CLI service into src/gen. Run with `npm run gen` (buf + the local
# protoc-gen-es / protoc-gen-connect-query from devDependencies).
#
# Input is the workspace proto tree, which carries codefly/cli + its transitive
# deps (base, observability, services/agent).
inputs:
  - directory: ../proto
plugins:
  # protobuf-es v2 emits messages AND the service descriptor; connect + connect-
  # query v2 consume that directly (useQuery(CLI.method.x)), so no separate
  # connect plugin is needed.
  - local: ./node_modules/.bin/protoc-gen-es
    out: src/gen
    opt:
      - target=ts
      - import_extension=js
